<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#ffb6d9" />
<link rel="manifest" href="manifest.json" />
<title>アウジュアKAクエスト ✦ KA対策クイズ</title>
<style>
  :root{
    --pink:#ffb6d9; --purple:#c9a9ff; --mint:#a9f0d9;
    --pink-deep:#ff7fb6; --purple-deep:#9a6cff; --mint-deep:#52d6ad;
    --ink:#5b4a6b; --ink-soft:#8a7a9c;
    --card:#fffafd; --good:#3fd29a; --bad:#ff7a9a;
    --gold:#ffcf5c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic","Hiragino Sans","Meiryo",sans-serif;
    color:var(--ink);
    background:linear-gradient(135deg,#ffd9ec 0%,#e7d6ff 45%,#cdf6e8 100%);
    background-attachment:fixed;
    min-height:100vh;
    overflow-x:hidden;
  }
  #bg-blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .blob{position:absolute;border-radius:50%;filter:blur(38px);opacity:.55;animation:float 14s ease-in-out infinite;}
  .blob.b1{width:280px;height:280px;background:#ffaad4;top:-60px;left:-50px;}
  .blob.b2{width:240px;height:240px;background:#bda4ff;bottom:-40px;right:-30px;animation-delay:-4s;}
  .blob.b3{width:200px;height:200px;background:#9af0d3;top:40%;left:60%;animation-delay:-8s;}
  .blob.b4{width:160px;height:160px;background:#ffd6a8;top:55%;left:5%;animation-delay:-6s;}
  @keyframes float{0%,100%{transform:translateY(0) translateX(0) scale(1);}50%{transform:translateY(-30px) translateX(20px) scale(1.08);}}
  #root{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:16px 16px 40px;}
  .sparkle{position:fixed;font-size:14px;opacity:.8;z-index:0;pointer-events:none;animation:tw 3s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.25;transform:scale(.8) rotate(0);}50%{opacity:.9;transform:scale(1.2) rotate(20deg);}}
  /* shared */
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:18px;transition:transform .12s, box-shadow .12s, filter .12s;}
  .btn:active{transform:scale(.96);}
  .card{background:var(--card);border-radius:26px;box-shadow:0 10px 30px rgba(154,108,255,.18);}
  .fade{animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .pop{animation:pop .35s cubic-bezier(.2,1.4,.4,1);}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  ::-webkit-scrollbar{width:0;}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="bg-blobs">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>
<div id="root"></div>
<script type="text/babel" src="app.jsx" data-presets="react"></script>
</body>
</html>
